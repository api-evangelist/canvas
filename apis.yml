aid: canvas
url: >-
  https://raw.githubusercontent.com/api-evangelist/canvas/refs/heads/main/apis.yml
name: Canvas
description: >-
  Canvas is Instructure's open-source learning management system (LMS)
  used by K-12, higher education, and corporate training organizations
  to deliver courses, assessments, and learner communication. Canvas
  exposes a comprehensive REST API and a GraphQL endpoint for reading
  and modifying courses, assignments, quizzes, grades, users,
  enrollments, content, and account administration, and it integrates
  with external tools through LTI, Caliper, and live event streams.
type: Index
kind: company
position: Consumer
access: 3rd-Party
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
- Education
- EdTech
- GraphQL
- Learning Management System
- LMS
- LTI
- Open Source
- REST
